# isce_config.yaml
# Central configuration for the ISCE STB V2X Security Pipeline.
# This file is consumed by pipeline blocks (B1, B2, B3, …).
#
# References:
#   ETSI EN 302 637-2 (CAM)
#   ETSI EN 302 637-3 (DENM)
#   ETSI TS 102 894-2  (ITS-AID / PSID registry)
#   ETSI TS 103 900    (ITS station types)

# ---------------------------------------------------------------------------
# ETSI ITS Station Type Enumeration
# Integer values match ETSI TS 103 900 / EN 302 895 StationType.
# ---------------------------------------------------------------------------
station_types:
  unknown:          0
  pedestrian:       1
  cyclist:          2
  moped:            3
  motorcycle:       4
  passengerCar:     5
  bus:              6
  lightTruck:       7
  heavyTruck:       8
  trailer:          9
  specialVehicle:   10
  tram:             11
  lightVruVehicle:  12   # e-scooter, e-bike, etc.
  animal:           13
  agricultural:     14
  roadSideUnit:     15

# ---------------------------------------------------------------------------
# Recognised ITS Message Types (message_id values as per ETSI EN 302 637-x)
# ---------------------------------------------------------------------------
message_types:
  CAM:    1    # Cooperative Awareness Message
  DENM:   2    # Decentralised Environmental Notification Message
  MAPEM:  5    # MAP Extended Message
  SPATEM: 6    # Signal Phase And Timing Message
  SREM:   7    # Signal Request Extended Message
  SSEM:   8    # Signal Status Extended Message
  IVIM:   11   # Infrastructure to Vehicle Information Message
  EVCSN:  15   # Electric Vehicle Charging Spot Notification
  SAEM:   16   # Service Announcement Extended Message
  RTCMEM: 28   # RTCM Extended Message (GNSS correction data)

# ---------------------------------------------------------------------------
# B1 – Sender Certificate Semantic Validation (SCSV) policy
#
# Each rule has:
#   station_type  – string key from station_types above, or "*" (wildcard)
#   message_type  – string key from message_types above, or "*" (wildcard)
#   action        – "allow" | "block"
#   score         – float 0.0–1.0 returned by SCSV.check()
#                   (allow → 1.0, block → 0.0 by convention; can be fractional
#                    for future confidence-weighted rules)
#   note          – human-readable rationale (optional)
#
# Rules are evaluated top-to-bottom; the first matching rule wins.
# If no rule matches, default_policy applies.
# ---------------------------------------------------------------------------
b1_scsv:

  default_policy: block   # "allow" or "block" — fail-closed: unknown combinations are blocked

  rules:

    # ── Passenger vehicles (ITS-S on-board) ──────────────────────────────
    - station_type: passengerCar
      message_type: CAM
      action: allow
      score: 1.0
      note: "Normal CAM broadcast from a passenger vehicle – expected traffic."

    - station_type: passengerCar
      message_type: DENM
      action: allow
      score: 1.0
      note: "Passenger cars may issue DENMs for hazard warnings."

    - station_type: passengerCar
      message_type: SREM
      action: block
      score: 0.0
      note: "SREM is reserved for roadside / infrastructure; a car sending it is suspicious."

    - station_type: passengerCar
      message_type: SPATEM
      action: block
      score: 0.0
      note: "SPATEM is an RSU/infrastructure message; passenger cars must not originate it."

    - station_type: passengerCar
      message_type: MAPEM
      action: block
      score: 0.0
      note: "MAPEM is an RSU/infrastructure message; passenger cars must not originate it."

    # ── Other road vehicles ───────────────────────────────────────────────
    - station_type: bus
      message_type: CAM
      action: allow
      score: 1.0
      note: "Bus broadcasting its position – normal V2X traffic."

    - station_type: bus
      message_type: DENM
      action: allow
      score: 1.0
      note: "Bus issuing DENM hazard alert."

    - station_type: bus
      message_type: SPATEM
      action: block
      score: 0.0
      note: "SPATEM must not originate from a bus."

    - station_type: lightTruck
      message_type: CAM
      action: allow
      score: 1.0
      note: "Light truck broadcasting position via CAM – normal V2X traffic."

    - station_type: lightTruck
      message_type: DENM
      action: allow
      score: 1.0
      note: "Light truck issuing DENM hazard alert."

    - station_type: heavyTruck
      message_type: CAM
      action: allow
      score: 1.0
      note: "Heavy truck broadcasting position via CAM – normal V2X traffic."

    - station_type: heavyTruck
      message_type: DENM
      action: allow
      score: 1.0
      note: "Heavy truck issuing DENM hazard alert."

    - station_type: motorcycle
      message_type: CAM
      action: allow
      score: 1.0
      note: "Motorcycle broadcasting position via CAM – normal VRU traffic."

    - station_type: motorcycle
      message_type: DENM
      action: allow
      score: 1.0
      note: "Motorcycle issuing DENM hazard alert."

    - station_type: moped
      message_type: CAM
      action: allow
      score: 1.0
      note: "Moped (VRU) broadcasting position via CAM – normal V2X traffic."

    - station_type: cyclist
      message_type: CAM
      action: allow
      score: 1.0
      note: "Cyclist (VRU) broadcasting position via CAM – normal V2X traffic."

    - station_type: pedestrian
      message_type: CAM
      action: allow
      score: 1.0
      note: "Pedestrian VRU device sending CAM – allowed."

    - station_type: pedestrian
      message_type: SPATEM
      action: block
      score: 0.0
      note: "A pedestrian device must not originate SPATEM."

    - station_type: tram
      message_type: CAM
      action: allow
      score: 1.0
      note: "Tram broadcasting position via CAM – normal public-transport V2X traffic."

    - station_type: specialVehicle
      message_type: CAM
      action: allow
      score: 1.0
      note: "Special vehicle (emergency/utility) broadcasting position via CAM."

    - station_type: specialVehicle
      message_type: DENM
      action: allow
      score: 1.0
      note: "Special vehicle issuing DENM hazard or incident notification."

    - station_type: agricultural
      message_type: CAM
      action: allow
      score: 1.0
      note: "Agricultural vehicle broadcasting position via CAM."

    - station_type: trailer
      message_type: CAM
      action: allow
      score: 1.0
      note: "Trailer broadcasting position via CAM (tractor-unit equipped ITS-S)."

    - station_type: lightVruVehicle
      message_type: CAM
      action: allow
      score: 1.0
      note: "Light VRU vehicle (e-scooter, e-bike) broadcasting position via CAM."

    - station_type: animal
      message_type: CAM
      action: allow
      score: 1.0
      note: "Animal-tag ITS-S broadcasting position via CAM."

    # ── Infrastructure-only message types blocked for road vehicles ───────
    - station_type: passengerCar
      message_type: RTCMEM
      action: block
      score: 0.0
      note: "RTCMEM (GNSS correction data) is infrastructure-only; a passenger car originating it is anomalous."

    - station_type: bus
      message_type: RTCMEM
      action: block
      score: 0.0
      note: "RTCMEM (GNSS correction data) is infrastructure-only; a bus originating it is anomalous."

    - station_type: passengerCar
      message_type: IVIM
      action: block
      score: 0.0
      note: "IVIM (Infrastructure to Vehicle Information) must originate from infrastructure, not a passenger car."

    - station_type: bus
      message_type: IVIM
      action: block
      score: 0.0
      note: "IVIM must originate from infrastructure, not a bus."

    - station_type: passengerCar
      message_type: EVCSN
      action: block
      score: 0.0
      note: "EVCSN (EV Charging Spot Notification) is a charging-operator message; a passenger car must not originate it."

    - station_type: bus
      message_type: EVCSN
      action: block
      score: 0.0
      note: "EVCSN is a charging-operator message; a bus must not originate it."

    - station_type: passengerCar
      message_type: SAEM
      action: block
      score: 0.0
      note: "SAEM (Service Announcement) is an infrastructure/operator message; a passenger car must not originate it."

    - station_type: bus
      message_type: SAEM
      action: block
      score: 0.0
      note: "SAEM is an infrastructure/operator message; a bus must not originate it."

    # ── Road-Side Unit (infrastructure) – wildcard ────────────────────────
    - station_type: roadSideUnit
      message_type: "*"
      action: allow
      score: 1.0
      note: "RSUs are trusted infrastructure; any message type is permitted."

    # ── Unknown station type ──────────────────────────────────────────────
    - station_type: unknown
      message_type: "*"
      action: block
      score: 0.0
      note: "Station type 0 (unknown) – identity unverifiable; block all."
